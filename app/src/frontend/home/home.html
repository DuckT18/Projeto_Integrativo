<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Plataforma de Resgate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            yellow: '#FACD19',
                        }
                    }
                },
            },
        };
    </script>
    <link rel="stylesheet" href="./home.css?v=4">
    <script src="./home.js?v=4" type="module" defer></script>
</head>
<!-- BODY: Altura fixa e sem rolagem global -->
<body class="h-full w-full font-sans antialiased text-gray-900 bg-white overflow-hidden">

    <!-- APP WRAPPER: Flex Column para organizar Header, Main e Footer -->
    <div id="app-wrapper" class="max-w-md mx-auto h-full relative bg-white flex flex-col shadow-2xl">
        
        <!-- 1. CABEÇALHO (Fixo no topo da flex column) -->
        <header class="flex-none flex items-center justify-between px-6 py-4 bg-white z-20">
            <button class="text-gray-900 p-1 hover:bg-gray-100 rounded-full">
                <i data-lucide="menu" class="h-7 w-7"></i>
            </button>

            <div class="relative">
                <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border-2 border-white shadow-sm ring-1 ring-gray-100">
                    <img id="user-avatar-header" src="" onerror="this.src='https://i.pravatar.cc/150?img=68'" alt="Perfil" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="w-8 h-8 bg-brand-yellow rounded-lg shadow-sm transform rotate-3"></div>
        </header>

        <!-- 2. CONTEÚDO ROLÁVEL (Ocupa o espaço restante) -->
        <main class="flex-grow overflow-y-auto overflow-x-hidden pb-28 scroll-smooth" id="main-scroll">
            
            <!-- Boas Vindas -->
            <div class="px-6 mt-2 mb-6">
                <h1 class="text-2xl font-extrabold text-black leading-tight">
                    Olá, <span id="welcome-name" class="text-brand-yellow">...</span>! 👋
                </h1>
                <p class="text-xs text-gray-500 font-medium">Vamos ajudar algum amigo hoje?</p>
            </div>
            
            <!-- Loading Spinner -->
            <div id="loading-spinner" class="text-center py-20">
                <div class="flex justify-center items-center space-x-2">
                    <div class="w-3 h-3 rounded-full bg-brand-yellow animate-bounce"></div>
                    <div class="w-3 h-3 rounded-full bg-brand-yellow animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-3 h-3 rounded-full bg-brand-yellow animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
                <p class="mt-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Carregando</p>
            </div>

            <!-- Container Dinâmico -->
            <div id="dynamic-content" class="hidden flex flex-col gap-8">
                <!-- O JavaScript preenche aqui -->
            </div>

        </main>

        <!-- 3. MENU INFERIOR (Fixo visualmente, mas dentro do wrapper) -->
        <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-30 pb-6 rounded-t-3xl shadow-[0_-5px_20px_-5px_rgba(0,0,0,0.05)]">
            
            <a href="#" class="flex flex-col items-center gap-1 text-brand-yellow p-2">
                <i data-lucide="house" class="h-6 w-6 fill-current"></i>
                <span class="h-1 w-1 bg-brand-yellow rounded-full"></span>
            </a>

            <a href="../map/map.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-900 transition-colors p-2">
                <i data-lucide="map" class="h-6 w-6"></i>
            </a>

            <!-- Botão Adicionar Flutuante -->
            <a href="../create_case/create_case.html" class="bg-brand-yellow text-white rounded-2xl p-4 shadow-xl shadow-yellow-200 transform -translate-y-6 hover:scale-110 transition-transform border-4 border-white flex items-center justify-center">
                <i data-lucide="plus" class="h-7 w-7"></i>
            </a>

            <a href="../chat/chat.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-900 transition-colors p-2">
                <i data-lucide="message-circle" class="h-6 w-6"></i>
            </a>

            <button id="logout-button" class="flex flex-col items-center gap-1 text-gray-400 hover:text-red-500 transition-colors p-2">
                <i data-lucide="log-out" class="h-6 w-6"></i>
            </button>
        </nav>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => { if (window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
