<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { yellow: '#FACD19' } }
                },
            },
        };
    </script>
    <link rel="stylesheet" href="../chat/chat.css">
    <script src="conversation.js" type="module" defer></script>
</head>
<body class="h-full font-sans antialiased text-gray-900 bg-gray-100">

    <div id="app-wrapper" class="max-w-md mx-auto h-full relative bg-white flex flex-col shadow-2xl">
        
        <!-- Header da Conversa -->
        <header class="flex items-center px-4 py-3 bg-white border-b border-gray-100 z-20 shadow-sm">
            <a href="chat.html" class="p-2 -ml-2 rounded-full hover:bg-gray-100 text-gray-600 mr-2">
                <i data-lucide="arrow-left" class="h-6 w-6"></i>
            </a>
            
            <div class="relative">
                <img id="chat-avatar" src="https://i.pravatar.cc/150?img=12" class="w-10 h-10 rounded-full object-cover border border-gray-100">
                <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white rounded-full"></span>
            </div>
            
            <div class="ml-3 flex-1">
                <h2 id="chat-name" class="text-sm font-bold text-gray-900 leading-tight">Ana Resgatista</h2>
                <p class="text-xs text-green-600 font-medium">Online agora</p>
            </div>

            <button class="p-2 text-gray-400 hover:bg-gray-50 rounded-full">
                <i data-lucide="more-vertical" class="h-5 w-5"></i>
            </button>
        </header>

        <!-- Área de Mensagens (Scroll) -->
        <main id="messages-area" class="flex-grow overflow-y-auto p-4 space-y-4 bg-[#fafafa]">
            
            <!-- Data Divisor -->
            <div class="flex justify-center my-4">
                <span class="text-[10px] font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full uppercase tracking-wider">Hoje</span>
            </div>

            <!-- Mensagem Recebida (Esquerda) -->
            <div class="flex gap-3 max-w-[85%]">
                <img src="https://i.pravatar.cc/150?img=12" class="w-8 h-8 rounded-full object-cover self-end mb-1">
                <div class="bg-white border border-gray-100 p-3 rounded-2xl rounded-bl-none shadow-sm">
                    <p class="text-sm text-gray-700">Oi! Você viu o cachorro na praça?</p>
                    <span class="text-[10px] text-gray-400 block text-right mt-1">10:30</span>
                </div>
            </div>

            <!-- Mensagem Enviada (Direita - Amarela) -->
            <div class="flex gap-3 max-w-[85%] self-end flex-row-reverse">
                <div class="bg-brand-yellow p-3 rounded-2xl rounded-br-none shadow-sm">
                    <p class="text-sm text-black font-medium">Vi sim! Já estou indo lá levar água.</p>
                    <div class="flex items-center justify-end gap-1 mt-1">
                        <span class="text-[10px] text-yellow-800/60">10:32</span>
                        <i data-lucide="check-check" class="h-3 w-3 text-black/60"></i>
                    </div>
                </div>
            </div>

            <!-- Mensagem Recebida -->
            <div class="flex gap-3 max-w-[85%]">
                <img src="https://i.pravatar.cc/150?img=12" class="w-8 h-8 rounded-full object-cover self-end mb-1">
                <div class="bg-white border border-gray-100 p-3 rounded-2xl rounded-bl-none shadow-sm">
                    <p class="text-sm text-gray-700">Perfeito! Me avisa quando chegar?</p>
                    <span class="text-[10px] text-gray-400 block text-right mt-1">10:33</span>
                </div>
            </div>

        </main>

        <!-- Input de Envio (Footer) -->
        <footer class="bg-white p-3 border-t border-gray-100 flex items-end gap-2 z-20">
            <button class="p-3 text-gray-400 hover:text-gray-600 hover:bg-gray-50 rounded-xl transition-colors">
                <i data-lucide="plus" class="h-6 w-6"></i>
            </button>
            
            <div class="flex-grow bg-gray-100 rounded-xl flex items-center px-4 py-2">
                <input type="text" id="message-input" placeholder="Digite sua mensagem..." class="w-full bg-transparent text-sm text-gray-800 placeholder:text-gray-400 focus:outline-none max-h-24 py-1" autocomplete="off">
            </div>

            <button id="send-btn" class="p-3 bg-brand-yellow text-white rounded-xl hover:bg-yellow-500 shadow-md transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="send-horizontal" class="h-5 w-5 fill-current"></i>
            </button>
        </footer>

    </div>
    <script>document.addEventListener("DOMContentLoaded", () => { if (window.lucide) lucide.createIcons(); });</script>
</body>
</html>
