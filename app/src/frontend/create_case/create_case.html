<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Caso - Resgate.PET</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { yellow: '#FACD19' } }
                },
            },
        };
    </script>

    <!-- Leaflet CSS (Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="create_case.css">
    <script src="create_case.js" type="module" defer></script>
</head>
<body class="h-full font-sans antialiased text-gray-900 bg-gray-100">

    <div id="app-wrapper" class="max-w-md mx-auto min-h-screen relative bg-white flex flex-col shadow-2xl">
        
        <!-- Header -->
        <header class="flex items-center px-6 py-4 border-b border-gray-100">
            <a href="../home/home.html" class="p-2 -ml-2 rounded-full hover:bg-gray-100 text-gray-700">
                <i data-lucide="arrow-left" class="h-6 w-6"></i>
            </a>
            <h1 class="text-lg font-bold text-gray-900 ml-2">Reportar Caso</h1>
        </header>

        <!-- Conteúdo do Formulário -->
        <main class="flex-grow p-6 overflow-y-auto pb-24">
            
            <form id="create-case-form" class="space-y-6">
                
                <!-- Foto -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Foto do Animal</label>
                    <div id="image-upload-area" class="border-2 border-dashed border-gray-300 rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:border-brand-yellow hover:bg-yellow-50 transition-colors">
                        <div id="upload-placeholder" class="text-center">
                            <div class="bg-gray-100 p-3 rounded-full inline-block mb-2">
                                <i data-lucide="camera" class="h-6 w-6 text-gray-500"></i>
                            </div>
                            <p class="text-xs text-gray-500">Toque para adicionar foto</p>
                        </div>
                        <img id="preview-image" src="" class="hidden w-full h-48 object-cover rounded-lg">
                    </div>
                    <input type="hidden" id="imagem_url" name="imagem_url" value="https://placeimg.com/640/480/animals">
                </div>

                <!-- NOVO: Campo Título -->
                <div class="space-y-2">
                    <label for="titulo" class="block text-sm font-medium text-gray-700">Título</label>
                    <input type="text" id="titulo" name="titulo" required placeholder="Ex: Cão abandonado" 
                        class="w-full rounded-lg border-gray-300 border p-3 text-sm focus:border-brand-yellow focus:ring-brand-yellow outline-none transition shadow-sm">
                </div>

                <!-- Campo Descrição (Antigo 'O que aconteceu?') -->
                <div class="space-y-2">
                    <label for="descricao" class="block text-sm font-medium text-gray-700">O que aconteceu?</label>
                    <textarea id="descricao" name="descricao" required rows="3" placeholder="Descreva a situação, aparência do animal, etc." 
                        class="w-full rounded-lg border-gray-300 border p-3 text-sm focus:border-brand-yellow focus:ring-brand-yellow outline-none transition shadow-sm resize-none"></textarea>
                </div>

                <!-- Localização -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Localização</label>
                    
                    <div class="flex gap-2">
                        <input type="text" id="localizacao" name="localizacao" required placeholder="Endereço ou ponto de referência" 
                            class="w-full rounded-lg border-gray-300 border p-3 text-sm focus:border-brand-yellow focus:ring-brand-yellow outline-none transition shadow-sm">
                        
                        <!-- Botão GPS Automático -->
                        <button type="button" id="btn-gps" class="bg-gray-100 text-gray-600 p-3 rounded-lg hover:bg-green-100 hover:text-green-600 transition-colors border border-gray-200" title="Usar minha localização atual">
                            <i data-lucide="crosshair" class="h-5 w-5"></i>
                        </button>

                        <!-- Botão Selecionar no Mapa -->
                        <button type="button" id="btn-open-map" class="bg-gray-100 text-gray-600 p-3 rounded-lg hover:bg-brand-yellow hover:text-white transition-colors border border-gray-200" title="Selecionar no Mapa">
                            <i data-lucide="map" class="h-5 w-5"></i>
                        </button>
                    </div>
                    
                    <p id="gps-status" class="text-xs text-gray-500 flex items-center hidden">
                        <i data-lucide="check" class="h-3 w-3 mr-1"></i> Coordenadas capturadas
                    </p>

                    <input type="hidden" id="lat" name="lat">
                    <input type="hidden" id="lng" name="lng">
                </div>

                <!-- Urgência -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Nível de Urgência</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="urgencia" value="Baixa" class="peer sr-only" checked>
                            <div class="rounded-lg border border-gray-200 p-3 text-center peer-checked:border-brand-yellow peer-checked:bg-yellow-50 peer-checked:text-yellow-700 transition-all">
                                <span class="text-sm font-medium">Baixa</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="urgencia" value="Média" class="peer sr-only">
                            <div class="rounded-lg border border-gray-200 p-3 text-center peer-checked:border-orange-500 peer-checked:bg-orange-50 peer-checked:text-orange-700 transition-all">
                                <span class="text-sm font-medium">Média</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="urgencia" value="Alta" class="peer sr-only">
                            <div class="rounded-lg border border-gray-200 p-3 text-center peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:text-red-700 transition-all">
                                <span class="text-sm font-medium">Alta</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Botão Enviar -->
                <button type="submit" id="submit-btn" class="w-full bg-brand-yellow text-white font-bold py-4 rounded-xl shadow-lg hover:bg-yellow-500 transition-transform active:scale-95 flex justify-center items-center gap-2">
                    <span>Criar Alerta</span>
                    <i data-lucide="send" class="h-5 w-5"></i>
                </button>

            </form>
        </main>

        <!-- Menu Inferior -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 rounded-t-[20px] shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] px-6 py-4 flex justify-between items-center z-50 max-w-md mx-auto">
            <a href="../home/home.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600">
                <i data-lucide="house" class="h-6 w-6"></i>
            </a>
            <a href="../map/map.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600">
                <i data-lucide="map" class="h-6 w-6"></i>
            </a>
            <div class="bg-brand-yellow text-white rounded-xl p-3 shadow-lg transform -translate-y-4 border-4 border-gray-100">
                <i data-lucide="plus" class="h-7 w-7"></i>
            </div>
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600">
                <i data-lucide="message-circle" class="h-6 w-6"></i>
            </a>
            <button id="logout-button" class="flex flex-col items-center gap-1 text-red-500 hover:text-red-600">
                <i data-lucide="log-out" class="h-6 w-6"></i>
            </button>
        </nav>

    </div>

    <!-- MODAL DE MAPA -->
    <div id="map-modal" class="fixed inset-0 z-[2000] hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md h-[80vh] rounded-2xl flex flex-col shadow-2xl overflow-hidden relative">
            <div class="p-4 bg-white border-b flex justify-between items-center z-10">
                <h3 class="font-bold text-gray-800">Escolha a Localização</h3>
                <button id="close-map-modal" class="p-2 hover:bg-gray-100 rounded-full">
                    <i data-lucide="x" class="h-5 w-5 text-gray-500"></i>
                </button>
            </div>
            <div id="picker-map" class="flex-grow bg-gray-200 relative">
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-full z-[1000] pointer-events-none drop-shadow-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="#FACD19" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3" fill="white"/></svg>
                </div>
            </div>
            <div class="p-4 bg-white border-t z-10">
                <p class="text-xs text-gray-500 text-center mb-3">Arraste o mapa para posicionar o pino</p>
                <button id="confirm-location-btn" class="w-full bg-brand-yellow text-white font-bold py-3 rounded-xl hover:bg-yellow-500 transition-colors">
                    Confirmar Localização
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => { if (window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
