<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Plataforma de Resgate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-dev@latest" defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            yellow: '#FACD19',
                            text: '#DFAA00',
                        }
                    }
                },
            },
        };
    </script>
    <link rel="stylesheet" href="./register.css">
    <script src="./register.js" type="module" defer></script>
</head>
<body class="h-full font-sans antialiased text-gray-900 bg-gray-50">

    <div class="min-h-screen flex flex-col justify-center sm:py-12">
        
        <div class="relative sm:max-w-md sm:mx-auto sm:w-full h-full sm:h-auto flex flex-col bg-gray-50 sm:rounded-3xl sm:shadow-xl overflow-hidden">
            
            <!-- Seção Superior -->
            <div class="px-8 pt-10 pb-6">
                <div class="w-12 h-12 bg-brand-yellow rounded-md shadow-sm mb-4"></div>
            </div>

            <!-- Seção Inferior (Formulário) -->
            <div class="bg-white rounded-t-[40px] px-8 py-8 flex-grow shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] flex flex-col">
                
                <h1 class="text-2xl font-extrabold text-black mb-6">Criar Conta</h1>

                <!-- Mensagem de ERRO -->
                <div id="register-error" class="hidden rounded-lg bg-red-50 p-4 mb-4 border border-red-100">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <i data-lucide="alert-circle" class="h-5 w-5 text-red-400"></i>
                        </div>
                        <div class="ml-3">
                            <h3 id="register-error-message" class="text-sm font-medium text-red-800"></h3>
                        </div>
                    </div>
                </div>

                <!-- Mensagem de SUCESSO -->
                <div id="register-success" class="hidden rounded-lg bg-green-50 p-4 mb-4 border border-green-100">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <i data-lucide="check-circle" class="h-5 w-5 text-green-400"></i>
                        </div>
                        <div class="ml-3">
                            <h3 id="register-success-message" class="text-sm font-medium text-green-800">Conta criada! Redirecionando...</h3>
                        </div>
                    </div>
                </div>

                <form id="register-form" class="space-y-4 flex-grow">
                    <!-- Nome Completo (nome) -->
                    <div>
                        <input id="nome" name="nome" type="text" required placeholder="Nome Completo"
                            class="block w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 placeholder:text-gray-400 focus:ring-2 focus:ring-brand-yellow focus:border-brand-yellow sm:text-sm sm:leading-6 outline-none transition duration-200">
                    </div>

                    <!-- Nome de Usuário (username) -->
                    <div>
                        <input id="username" name="username" type="text" required placeholder="Nome de Usuário (Login)"
                            class="block w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 placeholder:text-gray-400 focus:ring-2 focus:ring-brand-yellow focus:border-brand-yellow sm:text-sm sm:leading-6 outline-none transition duration-200">
                    </div>
                    
                    <!-- Email -->
                    <div>
                        <input id="email" name="email" type="email" autocomplete="email" required placeholder="Email"
                            class="block w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 placeholder:text-gray-400 focus:ring-2 focus:ring-brand-yellow focus:border-brand-yellow sm:text-sm sm:leading-6 outline-none transition duration-200">
                    </div>

                    <!-- Tipo de Perfil -->
                    <div class="relative">
                        <select id="tipo_perfil" name="tipo_perfil" required
                            class="block w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 bg-white focus:ring-2 focus:ring-brand-yellow focus:border-brand-yellow sm:text-sm sm:leading-6 outline-none transition duration-200 appearance-none">
                            <option value="" disabled selected>Selecione seu perfil</option>
                            <option value="Usuario">Usuário Comum</option>
                            <option value="Voluntario">Voluntário</option>
                            <option value="Resgatista">Resgatista</option>
                            <option value="ONG">ONG</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <i data-lucide="chevron-down" class="h-4 w-4"></i>
                        </div>
                    </div>

                    <!-- Senha -->
                    <div class="relative">
                        <input id="password" name="password" type="password" required placeholder="Senha"
                            class="block w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 placeholder:text-gray-400 focus:ring-2 focus:ring-brand-yellow focus:border-brand-yellow sm:text-sm sm:leading-6 outline-none transition duration-200 pr-10">
                         <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-gray-500 hover:text-gray-700">
                            <i data-lucide="eye" class="h-5 w-5"></i>
                        </div>
                    </div>

                    <!-- Confirmar Senha -->
                    <div class="relative">
                        <input id="password-confirm" name="password-confirm" type="password" required placeholder="Confirmar senha"
                            class="block w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 placeholder:text-gray-400 focus:ring-2 focus:ring-brand-yellow focus:border-brand-yellow sm:text-sm sm:leading-6 outline-none transition duration-200 pr-10">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-gray-500 hover:text-gray-700">
                            <i data-lucide="eye" class="h-5 w-5"></i>
                        </div>
                    </div>

                    <!-- Botão -->
                    <div class="pt-4">
                        <button type="submit"
                            class="flex w-full justify-center rounded-xl bg-brand-yellow px-3 py-3.5 text-base font-bold text-white shadow-sm hover:bg-yellow-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-yellow-500 transition-colors duration-200">
                            <span id="register-button-text">Criar Conta</span>
                            <div id="register-button-spinner" class="hidden animate-spin rounded-full h-6 w-6 border-b-2 border-white"></div>
                        </button>
                    </div>
                </form>

                <p class="mt-6 text-center text-sm font-medium text-gray-600">
                    Já tem uma conta?
                    <a href="../login/login.html" class="font-bold text-brand-text hover:text-yellow-600 underline decoration-2 underline-offset-2">Login.</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Inicializa ícones com segurança
        document.addEventListener("DOMContentLoaded", () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
