<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plataforma de Resgate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-dev@latest" defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            yellow: '#FACD19', 
                            text: '#DFAA00',   
                        }
                    }
                },
            },
        };
    </script>
    <link rel="stylesheet" href="./login.css">
    <script src="./login.js" type="module" defer></script>
</head>
<body class="h-full font-sans antialiased text-gray-900 bg-gray-50">

    <!-- Container Principal Centralizado para Desktop / Tela Cheia para Mobile -->
    <div class="min-h-screen flex flex-col justify-center sm:py-12">
        
        <!-- Wrapper que simula a tela do celular no desktop -->
        <div class="relative sm:max-w-md sm:mx-auto sm:w-full h-full sm:h-auto flex flex-col bg-gray-50 sm:rounded-3xl sm:shadow-xl overflow-hidden">
            
            <!-- Seção Superior (Boas Vindas) -->
            <div class="px-8 pt-12 pb-8">
                <!-- Quadrado Amarelo (Logo Placeholder) -->
                <div class="w-12 h-12 bg-brand-yellow rounded-md mb-6"></div>

                <h1 class="text-4xl font-extrabold text-brand-text leading-tight">
                    Seja <br /> Bem-Vindo!
                </h1>

                <p class="mt-4 text-sm text-gray-600 font-medium">
                    Lorem ipsum dolor amet, consectetur adipiscing elit.
                </p>
            </div>

            <!-- Seção Inferior (Formulário - Cartão Branco) -->
            <div class="bg-white rounded-t-[40px] px-8 py-10 flex-grow shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
                
                <h2 class="text-2xl font-bold text-black mb-8">Login</h2>

                <!-- Mensagem de erro de login (Mantida da lógica original) -->
                <div id="login-error" class="hidden rounded-md bg-red-50 p-4 mb-6">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <i data-lucide="alert-circle" class="h-5 w-5 text-red-400"></i>
                        </div>
                        <div class="ml-3">
                            <h3 id="login-error-message" class="text-sm font-medium text-red-800">E-mail ou senha incorretos.</h3>
                        </div>
                    </div>
                </div>

                <form id="login-form" class="space-y-5">
                    <!-- Input Email -->
                    <div>
                        <input id="email" name="username" type="email" autocomplete="email" required placeholder="Email"
                            class="block w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 placeholder:text-gray-400 focus:ring-2 focus:ring-brand-yellow focus:border-brand-yellow sm:text-sm sm:leading-6 outline-none transition duration-200">
                    </div>

                    <!-- Input Senha -->
                    <div class="relative">
                        <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Senha"
                            class="block w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 placeholder:text-gray-400 focus:ring-2 focus:ring-brand-yellow focus:border-brand-yellow sm:text-sm sm:leading-6 outline-none transition duration-200 pr-10">
                        
                        <!-- Ícone de Olho -->
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-gray-500 hover:text-gray-700">
                            <i data-lucide="eye" class="h-5 w-5"></i>
                        </div>
                    </div>

                    <!-- Link Esqueceu Senha -->
                    <div class="flex justify-start">
                        <a href="#" class="text-sm font-bold text-brand-text hover:text-yellow-600 underline decoration-2 underline-offset-2">
                            Esqueceu sua senha?
                        </a>
                    </div>

                    <!-- Botão de Login -->
                    <div class="pt-2">
                        <button type="submit"
                            class="flex w-full justify-center rounded-xl bg-brand-yellow px-3 py-3.5 text-base font-bold text-white shadow-sm hover:bg-yellow-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-yellow-500 transition-colors duration-200">
                            <span id="login-button-text">Login</span>
                            <div id="login-button-spinner" class="hidden animate-spin rounded-full h-6 w-6 border-b-2 border-white"></div>
                        </button>
                    </div>
                </form>

                <!-- Footer Criar Conta -->
                <p class="mt-8 text-center text-sm font-medium text-gray-600">
                    Não tem uma conta?
                    <a href="../register/register.html" class="font-bold text-brand-text hover:text-yellow-600 underline decoration-2 underline-offset-2">Criar.</a>
                </p>
            </div>

        </div>
    </div>

    <!-- Script para inicializar ícones Lucide -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
